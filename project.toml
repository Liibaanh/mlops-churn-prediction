[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mlops-churn-prediction"
version = "1.0.0"
requires-python = ">=3.11"
dependencies = [
    # Data processing
    "pandas>=2.0",                 # DataFrame operations
    "numpy>=1.26",                 # Numerical computing
    "scikit-learn>=1.4",           # Preprocessing and metrics

    # Deep learning
    "torch>=2.2",                  # PyTorch — neural network training
    "torchmetrics>=1.3",           # Model evaluation metrics

    # MLOps
    "mlflow>=2.11",                # Experiment tracking and model registry

    # Data drift detection
    "evidently>=0.4",              # Monitor model and data drift

    # Model serving
    "fastapi>=0.110",              # REST API for model serving
    "uvicorn>=0.29",               # ASGI server for FastAPI

    # Utilities
    "python-dotenv>=1.0",          # Read .env files
    "pydantic>=2.0",               # Data validation for API

    "kaggle>=1.6"                  # kaggle
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",                 # Test framework
    "pytest-cov>=5.0",             # Test coverage
    "httpx>=0.27",                 # Test FastAPI endpoints
    "ruff>=0.4",                   # Linter
    "mypy>=1.10",                  # Type checker
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"