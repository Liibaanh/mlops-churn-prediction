name: ML Model CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Action1
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx 

      - name: run API og Model-testing
        # Her vil pytest finne din test_api.py automatisk
        run: pytest

      - name: build Docker-image
        # Dette steget kjører bare hvis 'pytest' over passerer!
        if: success()
        run: |
          docker build -t churn-api:latest .